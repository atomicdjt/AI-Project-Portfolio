name: Vercel Affected Deployment Plan

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      project_id:
        description: Project to plan or deploy; use auto for changed-path selection
        required: true
        default: auto
        type: choice
        options:
          - auto
          - portfolio-hub
          - redactready-pro
          - processharbor
          - scamshield-ai
          - redactready-local
          - layerforge-studio
          - focusforge
          - variantvision-pro
          - garden-grid
      execute_deployment:
        description: Run the guarded deployment job instead of planning only
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: vercel-affected-${{ github.workflow }}-${{ github.ref }}-${{ github.event.inputs.project_id || 'auto' }}
  cancel-in-progress: true

env:
  VERCEL_CLI_VERSION: 54.21.1
  VERCEL_SCOPE: atomicdjts-projects

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.selector.outputs.deploy }}
      manual: ${{ steps.selector.outputs.manual }}
      reason: ${{ steps.selector.outputs.reason }}
      matrix: ${{ steps.selector.outputs.matrix }}
      has_deployments: ${{ steps.selector.outputs['has-deployments'] }}

    steps:
      - name: Checkout repository history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Determine changed files
        id: changes
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REQUESTED_PROJECT: ${{ github.event.inputs.project_id || 'auto' }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "workflow_dispatch" && "$REQUESTED_PROJECT" != "auto" ]]; then
            base="$CURRENT_SHA"
            head="$CURRENT_SHA"
            : > changed-files.txt
          elif [[ "$EVENT_NAME" == "pull_request" ]]; then
            base="$PR_BASE_SHA"
            head="$PR_HEAD_SHA"
            git diff --name-only "$base" "$head" | sort -u > changed-files.txt
          elif [[ "$EVENT_NAME" == "push" && -n "$PUSH_BEFORE_SHA" && "$PUSH_BEFORE_SHA" != "0000000000000000000000000000000000000000" ]]; then
            base="$PUSH_BEFORE_SHA"
            head="$CURRENT_SHA"
            git diff --name-only "$base" "$head" | sort -u > changed-files.txt
          else
            base="$(git rev-parse HEAD^)"
            head="$(git rev-parse HEAD)"
            git diff --name-only "$base" "$head" | sort -u > changed-files.txt
          fi

          echo "base=$base" >> "$GITHUB_OUTPUT"
          echo "head=$head" >> "$GITHUB_OUTPUT"
          echo "Changed files:"
          cat changed-files.txt

      - name: Select affected Vercel projects
        id: selector
        shell: bash
        env:
          REQUESTED_PROJECT: ${{ github.event.inputs.project_id || 'auto' }}
        run: |
          set -euo pipefail

          if [[ "$REQUESTED_PROJECT" != "auto" ]]; then
            node scripts/detect-affected-apps.mjs \
              --manifest config/vercel-projects.json \
              --project "$REQUESTED_PROJECT" \
              --github-output "$GITHUB_OUTPUT" | tee deployment-plan.json
          else
            node scripts/detect-affected-apps.mjs \
              --manifest config/vercel-projects.json \
              --files-from changed-files.txt \
              --github-output "$GITHUB_OUTPUT" | tee deployment-plan.json
          fi

      - name: Publish deployment plan summary
        shell: bash
        env:
          BASE_SHA: ${{ steps.changes.outputs.base }}
          HEAD_SHA: ${{ steps.changes.outputs.head }}
          REQUESTED_PROJECT: ${{ github.event.inputs.project_id || 'auto' }}
          EXECUTE_REQUESTED: ${{ github.event.inputs.execute_deployment || 'false' }}
          DEPLOY_PROJECTS: ${{ steps.selector.outputs.deploy }}
          MANUAL_PROJECTS: ${{ steps.selector.outputs.manual }}
          PLAN_REASON: ${{ steps.selector.outputs.reason }}
          ORCHESTRATION_ENABLED: ${{ vars.VERCEL_DEPLOYMENT_ORCHESTRATION_ENABLED }}
        run: |
          {
            echo "## Vercel affected-project plan"
            echo
            echo "- Base: \`$BASE_SHA\`"
            echo "- Head: \`$HEAD_SHA\`"
            echo "- Requested project: \`$REQUESTED_PROJECT\`"
            echo "- Execute requested: \`$EXECUTE_REQUESTED\`"
            echo "- Automatically deployable projects: \`$DEPLOY_PROJECTS\`"
            echo "- Manual-only projects: \`$MANUAL_PROJECTS\`"
            echo "- Selection reason: \`$PLAN_REASON\`"
            echo "- Deployment activation variable: \`${ORCHESTRATION_ENABLED:-not set}\`"
            echo
            if [[ "${ORCHESTRATION_ENABLED:-}" != "true" ]]; then
              echo "> Dry-run only. No Vercel deployment job is authorized until the repository variable is explicitly set to \`true\` after checkpoint approval."
            elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
              echo "> Pull requests are plan-only and never receive Vercel deployment credentials."
            elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "$EXECUTE_REQUESTED" != "true" ]]; then
              echo "> Manual dispatch is plan-only because execute_deployment was not enabled."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload deployment-plan evidence
        uses: actions/upload-artifact@v7
        with:
          name: vercel-affected-plan-${{ github.run_id }}
          path: |
            changed-files.txt
            deployment-plan.json
          if-no-files-found: error
          retention-days: 14

  deploy:
    name: Deploy ${{ matrix.publicName }}
    needs: plan
    if: >-
      ${{
        github.event_name != 'pull_request' &&
        needs.plan.outputs.has_deployments == 'true' &&
        vars.VERCEL_DEPLOYMENT_ORCHESTRATION_ENABLED == 'true' &&
        (github.event_name != 'workflow_dispatch' || inputs.execute_deployment == true)
      }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install repository dependencies
        run: npm ci

      - name: Verify selected application
        run: ${{ matrix.verificationCommand }}

      - name: Verify Vercel token
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$VERCEL_TOKEN"

      - name: Link selected Vercel project
        working-directory: ${{ matrix.path }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npx --yes "vercel@$VERCEL_CLI_VERSION" link \
            --yes \
            --project "${{ matrix.vercelProject }}" \
            --scope "$VERCEL_SCOPE" \
            --token "$VERCEL_TOKEN"

      - name: Pull Vercel project configuration
        working-directory: ${{ matrix.path }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          environment="preview"
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            environment="production"
          fi
          npx --yes "vercel@$VERCEL_CLI_VERSION" pull \
            --yes \
            --environment="$environment" \
            --scope "$VERCEL_SCOPE" \
            --token "$VERCEL_TOKEN"

      - name: Build Vercel output
        working-directory: ${{ matrix.path }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          production_flag=""
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            production_flag="--prod"
          fi
          npx --yes "vercel@$VERCEL_CLI_VERSION" build \
            $production_flag \
            --scope "$VERCEL_SCOPE" \
            --token "$VERCEL_TOKEN"

      - name: Deploy prebuilt output
        id: deploy
        working-directory: ${{ matrix.path }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          production_flag=""
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            production_flag="--prod"
          fi
          url="$(npx --yes "vercel@$VERCEL_CLI_VERSION" deploy \
            --prebuilt \
            $production_flag \
            --scope "$VERCEL_SCOPE" \
            --token "$VERCEL_TOKEN")"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Deployed ${{ matrix.publicName }} to $url"

      - name: Smoke-check deployed document
        shell: bash
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.url }}
        run: |
          set -euo pipefail
          curl --fail --location --silent --show-error \
            --retry 3 --retry-delay 2 \
            "$DEPLOYMENT_URL" > deployed-document.html
          test -s deployed-document.html

      - name: Publish deployment evidence
        shell: bash
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.url }}
        run: |
          {
            echo "## ${{ matrix.publicName }} deployment"
            echo
            echo "- Source SHA: \`${{ github.sha }}\`"
            echo "- Deployment: $DEPLOYMENT_URL"
            echo "- Canonical route: ${{ matrix.productionUrl }}"
          } >> "$GITHUB_STEP_SUMMARY"
