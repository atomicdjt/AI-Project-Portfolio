name: Portfolio CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint apps
        run: npm run lint:apps

      - name: Typecheck apps
        run: npm run typecheck:all

      - name: Test apps
        run: npm run test:all

      - name: Build apps
        run: npm run build:all
