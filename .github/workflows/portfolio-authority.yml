name: Portfolio Authority

on:
  pull_request:
    paths:
      - 'config/portfolio-authority.json'
      - 'docs/PROJECT_INDEX.md'
      - 'docs/project-ranking.md'
      - 'scripts/check-portfolio-authority.mjs'
      - '.github/workflows/portfolio-authority.yml'
  push:
    branches:
      - main
    paths:
      - 'config/portfolio-authority.json'
      - 'docs/PROJECT_INDEX.md'
      - 'docs/project-ranking.md'
      - 'scripts/check-portfolio-authority.mjs'
      - '.github/workflows/portfolio-authority.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: portfolio-authority-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate canonical portfolio status
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate authority manifest and public documentation
        run: node scripts/check-portfolio-authority.mjs
