name: ProcessHarbor Pro Verify

on:
  push:
    branches:
      - main
      - "codex/**"
    paths:
      - "apps/opspilot-ai-operations-toolkit/**"
      - "projects/opspilot-ai-operations-toolkit/**"
      - ".github/workflows/processharbor-pro-verify.yml"
      - "package.json"
      - "package-lock.json"
  pull_request:
    branches:
      - main
    paths:
      - "apps/opspilot-ai-operations-toolkit/**"
      - "projects/opspilot-ai-operations-toolkit/**"
      - ".github/workflows/processharbor-pro-verify.yml"
      - "package.json"
      - "package-lock.json"

jobs:
  processharbor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Check docs
        run: npm run check:docs

      - name: Lint ProcessHarbor
        run: npm run lint --workspace apps/opspilot-ai-operations-toolkit

      - name: Typecheck ProcessHarbor
        run: npm run typecheck --workspace apps/opspilot-ai-operations-toolkit

      - name: Test ProcessHarbor
        run: npm run test:run --workspace apps/opspilot-ai-operations-toolkit

      - name: Build ProcessHarbor
        run: npm run build --workspace apps/opspilot-ai-operations-toolkit

      - name: E2E ProcessHarbor
        run: npm run e2e --workspace apps/opspilot-ai-operations-toolkit

      - name: Upload Playwright output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: processharbor-playwright-output
          path: apps/opspilot-ai-operations-toolkit/docs/proof/test-results
          if-no-files-found: ignore
