name: Portfolio Vercel Readiness

on:
  push:
    branches:
      - main
      - "portfolio/**"
    paths:
      - apps/portfolio-hub/**
      - apps/layerforge-studio/**
      - package.json
      - package-lock.json
      - .github/workflows/deploy-layerforge.yml
  pull_request:
    branches:
      - main
    paths:
      - apps/portfolio-hub/**
      - apps/layerforge-studio/**
      - package.json
      - package-lock.json
      - .github/workflows/deploy-layerforge.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build portfolio hub for Vercel
        run: npm run build --workspace apps/portfolio-hub

      - name: Build LayerForge Studio for Vercel
        run: npm run build --workspace apps/layerforge-studio

      - name: Confirm static outputs
        run: |
          test -f apps/portfolio-hub/dist/index.html
          test -f apps/layerforge-studio/dist/index.html

      - name: Upload Vercel-readiness artifacts
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-vercel-readiness
          path: |
            apps/portfolio-hub/dist
            apps/layerforge-studio/dist
          if-no-files-found: error

# Deployment is intentionally not performed by GitHub Actions.
# Connect each app to its own Vercel project and deploy only through Vercel.
