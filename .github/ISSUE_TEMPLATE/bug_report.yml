name: Bug report
description: Report a reproducible problem in a portfolio project or demo.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Please do not include credentials, personal data, private documents, or other sensitive information.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the observed behavior and its impact.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reliable sequence of steps.
      placeholder: |
        1. Go to ...
        2. Enter ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser and device
      placeholder: Chrome 126 on Windows 11
  - type: textarea
    id: evidence
    attributes:
      label: Safe supporting evidence
      description: Add non-sensitive screenshots, console output, or notes if helpful.
